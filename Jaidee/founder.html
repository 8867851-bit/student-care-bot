<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ใจดี TU — Founder's Pick</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root{--cream:#FDFCF9;--dark:#1A1A1A;--mid:#555;--soft:#999;--border:#EEEBE4;--gold:#F5A623;--gold-soft:#FFF5E0;--gold-border:#FFE4A0;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;gap:20px;}
    .icon{font-size:56px;}
    .eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
    .title{font-family:'Playfair Display',serif;font-size:28px;line-height:1.3;}
    .body{font-size:14px;color:var(--mid);line-height:1.85;max-width:320px;}
    .badge{background:var(--gold-soft);border:1px solid var(--gold-border);border-radius:99px;padding:6px 16px;font-size:12px;font-weight:600;color:#7A5C00;}
    .back{background:none;border:none;color:var(--soft);font-size:13px;font-family:'Sarabun',sans-serif;cursor:pointer;margin-top:8px;}
  </style>
</head>
<body>
  <div class="icon">✨</div>
  <div class="eyebrow">ใจดี TU · Founder's Pick</div>
  <div class="title">Founder's Pick</div>
  <div class="badge">🌱 กำลังสร้าง — เร็วๆ นี้</div>
  <div class="body">จดหมายจากผู้นำชมรมจิตวิทยาทุกรุ่น<br><br>กำลังออกแบบและรวบรวม 💛</div>
  <button class="back" onclick="window.history.back()">← กลับ</button>
</body>
</html>
